/*
 * This file was generated by the Gradle 'init' task.
 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'buildlogic.java-library-conventions'
    id 'java-gradle-plugin'
    id 'maven-publish'
    id 'signing'
}

group = 'com.wxbrew'
version = '1.0.0'

java {
    withSourcesJar()
    withJavadocJar()
}

dependencies {
    implementation project(':core')
}

gradlePlugin {
    plugins {
        schemaExtractor {
            id = 'com.wxbrew.schema-extractor'
            implementationClass = 'com.wxbrew.plugin.SchemaExtractorPlugin'
        }
    }
}

publishing {
    repositories {
        maven {
            name = 'localRepo'
            url = uri("${rootDir}/plugin/build/repo")
        }
        maven {
            name = 'OSSRH'
            def releasesRepoUrl = "https://s01.oss.sonatype.org/content/repositories/releases/"
            def snapshotsRepoUrl = "https://s01.oss.sonatype.org/content/repositories/snapshots/"
            url = version.endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl
            credentials {
                username = project.findProperty("ossrhUsername") ?: System.getenv("OSSRH_USERNAME")
                password = project.findProperty("ossrhPassword") ?: System.getenv("OSSRH_PASSWORD")
            }
        }
    }
}

// Apply POM metadata to all publications (main plugin and plugin markers)
publishing.publications.configureEach {
    if (it instanceof MavenPublication) {
        it.pom {
            name = 'XSD Schema Subset Extractor Gradle Plugin'
            description = 'Gradle plugin to extract minimal, self-contained XML Schema (XSD) files from a larger schema definition.'
            url = 'https://github.com/wxbrew/XsdSchemaSubsetExtractor'
            
            licenses {
                license {
                    name = 'The MIT License'
                    url = 'https://opensource.org/licenses/MIT'
                }
            }
            developers {
                developer {
                    id = 'wxbrew'
                    name = 'WXBrew Team'
                    email = 'info@wxbrew.com'
                }
            }
            scm {
                connection = 'scm:git:git://github.com/wxbrew/XsdSchemaSubsetExtractor.git'
                developerConnection = 'scm:git:ssh://github.com:wxbrew/XsdSchemaSubsetExtractor.git'
                url = 'https://github.com/wxbrew/XsdSchemaSubsetExtractor'
            }
        }
    }
}

signing {
    required = { gradle.taskGraph.hasTask("publish") && (project.hasProperty("signing.keyId") || project.hasProperty("signing.signingKey")) }
    sign publishing.publications
}
