name: Publish to Maven Central

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Publish
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/wxbrew/devcontainers/java-gradle-mvn-claude
          imageTag: latest
          push: never
          env: |
            MAVEN_CENTRAL_USERNAME=${{ secrets.MAVEN_CENTRAL_USERNAME }}
            MAVEN_CENTRAL_TOKEN=${{ secrets.MAVEN_CENTRAL_TOKEN }}
            ORG_GRADLE_PROJECT_mavenCentralUsername=${{ secrets.MAVEN_CENTRAL_USERNAME }}
            ORG_GRADLE_PROJECT_mavenCentralPassword=${{ secrets.MAVEN_CENTRAL_TOKEN }}
            GPG_PRIVATE_KEY=${{ secrets.GPG_PRIVATE_KEY }}
            GPG_PASSPHRASE=${{ secrets.GPG_PASSPHRASE }}
          runCmd: |
            # Import GPG signing key
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import

            # Write Maven settings with Central Portal and GPG passphrase credentials
            mkdir -p ~/.m2
            cat > ~/.m2/settings.xml << 'EOF'
            <settings>
              <servers>
                <server>
                  <id>central</id>
                  <username>${env.MAVEN_CENTRAL_USERNAME}</username>
                  <password>${env.MAVEN_CENTRAL_TOKEN}</password>
                </server>
                <server>
                  <id>gpg.passphrase</id>
                  <passphrase>${env.GPG_PASSPHRASE}</passphrase>
                </server>
              </servers>
            </settings>
            EOF

            ./gradlew publishAndReleaseToMavenCentral
            ./gradlew :core:publishToMavenLocal
            cd maven-plugin && mvn deploy -B --no-transfer-progress
