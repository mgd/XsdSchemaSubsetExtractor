name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and test Gradle modules
        run: ./gradlew build

      - name: Publish core to local Maven repo (required for Maven plugin build)
        run: ./gradlew :core:publishToMavenLocal

      - name: Build and verify Maven plugin
        run: cd maven-plugin && mvn verify -B --no-transfer-progress -Dgpg.skip=true
