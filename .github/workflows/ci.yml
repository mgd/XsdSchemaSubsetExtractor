name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build and test
        uses: devcontainers/ci@0.3
        with:
          imageName: ghcr.io/wxbrew/devcontainers/java-gradle-mvn-claude
          imageTag: latest
          push: never
          runCmd: |
            ./gradlew build
            ./gradlew :core:publishToMavenLocal
            cd maven-plugin && mvn verify -B --no-transfer-progress -Dgpg.skip=true
