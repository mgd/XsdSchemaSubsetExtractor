/*
 * This file was generated by the Gradle 'init' task.
 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'buildlogic.java-library-conventions'
    id 'maven-publish'
    id 'signing'
}

java {
    withSourcesJar()
    withJavadocJar()
}

publishing {
    repositories {
        maven {
            name = 'localRepo'
            url = uri("${rootDir}/plugin/build/repo")
        }
        maven {
            name = 'OSSRH'
            def releasesRepoUrl = "https://s01.oss.sonatype.org/content/repositories/releases/"
            def snapshotsRepoUrl = "https://s01.oss.sonatype.org/content/repositories/snapshots/"
            url = version.endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl
            credentials {
                username = project.findProperty("ossrhUsername") ?: System.getenv("OSSRH_USERNAME")
                password = project.findProperty("ossrhPassword") ?: System.getenv("OSSRH_PASSWORD")
            }
        }
    }
    publications {
        mavenJava(MavenPublication) {
            from components.java

            pom {
                name = 'XSD Schema Subset Extractor Core'
                description = 'Core library to extract minimal, self-contained XML Schema (XSD) files from a larger schema definition.'
                url = 'https://github.com/wxbrew/XsdSchemaSubsetExtractor'
                
                licenses {
                    license {
                        name = 'The MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                    }
                }
                developers {
                    developer {
                        id = 'wxbrew'
                        name = 'M Dawson'
                        email = 'md@wxbrew.com'
                    }
                }
                scm {
                    connection = 'scm:git:git://github.com/wxbrew/XsdSchemaSubsetExtractor.git'
                    developerConnection = 'scm:git:ssh://github.com:wxbrew/XsdSchemaSubsetExtractor.git'
                    url = 'https://github.com/wxbrew/XsdSchemaSubsetExtractor'
                }
            }
        }
    }
}

signing {
    required = { gradle.taskGraph.hasTask("publish") && (project.hasProperty("signing.keyId") || project.hasProperty("signing.signingKey")) }
    sign publishing.publications.mavenJava
}
